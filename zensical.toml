[project]
site_name = "XCache"
site_description = "Libreria Go per il caching type-safe con supporto multi-backend"
site_author = "giulio333"
copyright = "&copy; 2025 giulio333"
repo_url = "https://github.com/giulio333/xcache"
repo_name = "giulio333/xcache"
edit_uri = "edit/main/docs/"

nav = [
  {"Home" = "index.md"},
  {"Architettura" = [
    "architecture/overview.md",
    "architecture/core.md",
    "architecture/memory-store.md",
    "architecture/managers.md"
  ]},
  {"Guide" = [
    "guides/getting-started.md",
    "guides/chain-cache.md",
    "guides/adding-a-sid.md"
  ]}
]

[project.theme]
features = [
  "navigation.tabs",
  "navigation.sections",
  "navigation.expand",
  "navigation.path",
  "content.action.edit",
  "content.action.view"
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[project.extra.version]
provider = "mike"
default = "stable"
alias = true

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true
title = "In questa pagina"
permalink_title = "Link alla sezione"
toc_depth = 3

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
pygments_lang_class = true
auto_title = true
linenums = false
linenums_style = "pymdownx-inline"
line_spans = "__span"

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]

[project.markdown_extensions.pymdownx.inlinehilite]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Passa alla modalità scura"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Passa alla modalità chiara"
